name: Build Debug App

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build fat universal app
        run: |
          chmod +x build.sh
          ./build.sh --universal

      - name: Upload universal app
        uses: actions/upload-artifact@v4
        with:
          name: BarTimeTracker.app
          path: BarTimeTracker.app
          retention-days: 30
